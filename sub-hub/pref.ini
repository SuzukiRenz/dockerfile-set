; ─────────────────────────────────────────────────────────────────────────────
; subconverter – internal-only configuration
; Port 25500 is NOT exposed to the host; it is accessed only by sub-server
; via the loopback interface inside the container.
; ─────────────────────────────────────────────────────────────────────────────

[common]
; API mode – required so /sub endpoint works
api_mode=true

; Leave blank: no external access token needed (it's loopback-only).
; Set a value if you want an extra layer of protection.
api_access_token=

; Do not insert any extra nodes
default_url=
enable_insert=false
insert_url=
prepend_insert_url=false

; Global remark filters (leave blank to keep all nodes)
exclude_remarks=
include_remarks=

; Base path for rule files bundled with subconverter
base_path=./base

; Default rule bases (bundled inside the subconverter image)
clash_rule_base=./base/clash.yaml
surge_rule_base=./base/surge.conf
surfboard_rule_base=./base/surfboard.conf
mellow_rule_base=./base/mellow.conf
quan_rule_base=./base/quantumult.conf
quanx_rule_base=./base/quantumultx.conf
loon_rule_base=./base/loon.conf
sssub_rule_base=./base/sssub.json
singbox_rule_base=./base/singbox.json

; Maximum download size per URL (bytes). 32 MB is plenty for self-built nodes.
max_download_size=33554432

[node_pref]
udp_flag=false
tcp_fast_open_flag=false
skip_cert_verify_flag=false
tls13_flag=false
sort_flag=false
sort_bypass_china_flag=false

; Remove nodes using deprecated/unsupported protocols
filter_deprecated_nodes=true

; Do not prepend protocol type to the node name
append_proxy_type=false

rename_node=

[managed_config]
; Seconds between profile update hints sent to clients
update_interval=86400
strict=false
clash_use_new_field_name=true
; Subscription URL is handled by sub-server; subconverter doesn't need to know
managed_config_prefix=

[surge_external_proxy]
surge_ssr_path=
resolve_hostname=true

[emojis]
add_emoji=true
remove_old_emoji=true

; Emoji rules shipped with subconverter (./base/emoji.txt) are used by default.

[ruleset]
; Use online rule-sets only when sub-server explicitly requests one via the
; "ruleset" query parameter. Sensible defaults are in the bundled rule bases.
enabled=true
overwrite_original_rules=false
update_ruleset_on_request=false

[proxy_group]
; Proxy group templates are defined in the rule bases (clash.yaml etc.)
; Override them here only if you need global changes.

[template]
; Jinja2-like template engine for clash / surge bases
template_path=./templates
globals=

[aliases]
; Short aliases routed by subconverter (/clash → /sub?target=clash etc.)
; Uncomment and adjust as needed.
; /clash=/sub?target=clash
; /surge=/sub?target=surge

[server]
; Bind to loopback: even if the port were somehow reachable from outside the
; container, it would refuse connections from non-127.0.0.1 sources.
listen=127.0.0.1
port=25500

[advanced]
log_level=warn
print_debug_info=false
max_pending_connections=10
max_concurrent_threads=4
; Aggressive caching reduces repeated fetching of the same nodes file
max_allowed_download_time=30
; Keep resolved IPs in cache (seconds)
; dns_cache_expire=600
