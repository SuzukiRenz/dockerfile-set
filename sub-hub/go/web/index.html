<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>订阅管理</title>
<style>
:root {
  --bg:      #0d1117;
  --bg2:     #161b22;
  --bg3:     #21262d;
  --bg4:     #30363d;
  --border:  #30363d;
  --text:    #e6edf3;
  --text2:   #8b949e;
  --accent:  #58a6ff;
  --accent2: #1f6feb;
  --green:   #3fb950;
  --red:     #f85149;
  --yellow:  #d29922;
  --radius:  8px;
  --shadow:  0 1px 3px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.5 "Segoe UI",system-ui,sans-serif;min-height:100vh}
a{color:var(--accent);text-decoration:none}

#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px;width:360px;text-align:center}
.auth-box h1{font-size:22px;margin-bottom:8px}
.auth-box p{color:var(--text2);margin-bottom:28px;font-size:13px}
.auth-box input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;margin-bottom:14px;outline:none}
.auth-box input:focus{border-color:var(--accent)}
.auth-error{color:var(--red);font-size:13px;margin-top:8px;min-height:20px}

#app{display:none;flex-direction:column;min-height:100vh}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:24px;height:52px}
header h1{font-size:16px;font-weight:600;white-space:nowrap}
header h1 span{color:var(--accent)}
nav{display:flex;gap:2px;margin-left:auto}
nav button{background:none;border:none;color:var(--text2);cursor:pointer;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;transition:.15s}
nav button:hover{background:var(--bg3);color:var(--text)}
nav button.active{background:var(--bg3);color:var(--accent)}
main{flex:1;padding:28px 24px;max-width:1100px;width:100%;margin:0 auto}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-weight:600;font-size:15px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--accent2);color:#fff}
.btn-primary:hover{background:var(--accent)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{background:transparent;border:none;cursor:pointer;color:var(--text2);padding:4px 6px;border-radius:4px;transition:.15s;font-size:14px}
.btn-icon:hover{color:var(--text);background:var(--bg3)}

.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;color:var(--text2);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}
.uri-cell{max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);font-family:monospace;font-size:12px}
.name-cell{font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.toggle{position:relative;display:inline-block;width:36px;height:20px}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--bg4);border-radius:20px;transition:.2s}
.slider:before{content:"";position:absolute;height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.slider{background:var(--accent2)}
input:checked+.slider:before{transform:translateX(16px)}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text2)}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:.15s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:140px;font-family:monospace;font-size:12px}
.form-hint{font-size:12px;color:var(--text2);margin-top:5px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

.link-table{width:100%;border-collapse:collapse}
.link-table tr td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.link-table tr:last-child td{border-bottom:none}
.link-table tr:hover td{background:rgba(255,255,255,.025)}
.link-label{font-weight:500;white-space:nowrap;min-width:140px;color:var(--text)}
.link-url{font-family:monospace;font-size:12px;color:var(--text2);word-break:break-all}
.copy-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;white-space:nowrap;transition:.15s}
.copy-btn:hover{background:var(--bg4);color:var(--text)}
.copy-btn.copied{color:var(--green);border-color:var(--green)}

.empty{text-align:center;padding:48px;color:var(--text2)}
.stat-row{display:flex;gap:20px;margin-bottom:16px}
.stat{background:var(--bg3);border-radius:var(--radius);padding:12px 18px;flex:1;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--accent)}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;font-size:13px;box-shadow:var(--shadow);z-index:200;animation:fadeIn .2s ease;pointer-events:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}}
.page{display:none}
.page.active{display:block}
.drag-handle{cursor:grab;color:var(--text2);padding:0 4px;user-select:none;font-size:16px}
.dragging{opacity:.4}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h1>🔗 订阅管理</h1>
    <p>请输入管理员 Token 以继续</p>
    <input type="password" id="token-input" placeholder="Token" autocomplete="current-password">
    <button class="btn btn-primary" style="width:100%" onclick="login()">登 录</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <h1>🔗 <span>Sub</span>Server</h1>
    <nav>
      <button class="active" onclick="showPage('nodes',this)">节点管理</button>
      <button onclick="showPage('settings',this)">设置</button>
      <button onclick="showPage('links',this)">订阅链接</button>
    </nav>
  </header>

  <main>
    <div class="page active" id="page-nodes">
      <div class="stat-row">
        <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">节点总数</div></div>
        <div class="stat"><div class="stat-num" id="stat-enabled">0</div><div class="stat-label">已启用</div></div>
        <div class="stat"><div class="stat-num" id="stat-disabled">0</div><div class="stat-label">已禁用</div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">节点列表</span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" onclick="openBatchModal()">批量导入</button>
            <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ 添加节点</button>
          </div>
        </div>
        <div class="table-wrap">
          <table id="nodes-table">
            <thead>
              <tr>
                <th style="width:32px"></th>
                <th>名称</th>
                <th>节点 URI</th>
                <th style="width:80px">启用</th>
                <th style="width:90px">操作</th>
              </tr>
            </thead>
            <tbody id="nodes-tbody"></tbody>
          </table>
          <div class="empty" id="nodes-empty" style="display:none">
            暂无节点 &mdash; 点击「添加节点」或「批量导入」
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-settings">
      <div class="card">
        <div class="card-header"><span class="card-title">基本设置</span></div>
        <div class="form-group">
          <label>订阅名称</label>
          <input type="text" id="cfg-sub-name" placeholder="My Subscription">
          <div class="form-hint">显示在客户端订阅列表中的名称，也用作下载文件名</div>
        </div>
        <div class="form-group">
          <label>Subconverter 远程配置 URL（可选）</label>
          <input type="url" id="cfg-subconfig" placeholder="https://example.com/clash-config.ini">
          <div class="form-hint">
            对应 subconverter 的 <code>config</code> 参数，用于自定义 Clash / Surge 规则组和代理组。
            留空则使用 subconverter 内置默认规则。
            <a href="https://github.com/tindy2013/subconverter/blob/master/README-cn.md" target="_blank">文档 →</a>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end">
          <button class="btn btn-primary" onclick="saveConfig()">保存设置</button>
        </div>
      </div>
    </div>

    <div class="page" id="page-links">
      <div class="card">
        <div class="card-header"><span class="card-title">订阅链接生成</span></div>
        <div class="form-row">
          <div class="form-group">
            <label>服务器地址（含端口）</label>
            <input type="text" id="links-host" placeholder="http://your-server:8080" oninput="renderLinks()">
          </div>
          <div class="form-group">
            <label>使用 Token</label>
            <select id="links-token" onchange="renderLinks()">
              <option value="admin">管理员 Token</option>
              <option value="guest">访客 Token（GUEST）</option>
            </select>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">各客户端链接</span></div>
        <div class="table-wrap">
          <table class="link-table" id="links-table">
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-backdrop" id="node-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">添加节点</div>
    <input type="hidden" id="modal-id">
    <div class="form-group">
      <label>节点 URI <span style="color:var(--red)">*</span></label>
      <input type="text" id="modal-uri" placeholder="vmess://… 或 vless://… 或 trojan://…">
    </div>
    <div class="form-group">
      <label>备注名称（可选，留空则从 URI # 后提取）</label>
      <input type="text" id="modal-name" placeholder="节点名称">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('node-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveNode()">保存</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="batch-modal">
  <div class="modal">
    <div class="modal-title">批量导入节点</div>
    <div class="form-group">
      <label>节点 URI 列表（每行一条，支持 vmess / vless / trojan / ss / ssr / hysteria2 / tuic）</label>
      <textarea id="batch-input" placeholder="vmess://...&#10;vless://...&#10;trojan://..."></textarea>
      <div class="form-hint">以 <code>#</code> 开头的行将被忽略；名称自动从 URI 尾部 <code>#节点名</code> 提取</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('batch-modal')">取消</button>
      <button class="btn btn-primary" onclick="doBatchImport()">导入</button>
    </div>
  </div>
</div>

<script>
let TOKEN = '';
let nodes  = [];
let config = {};

function getBase() {
  // Derive base path so that if the app is served under a subpath like /sub-hub/,
  // API calls use /sub-hub/api/... instead of /api/...
  const p = window.location.pathname;
  const i = p.lastIndexOf('/admin');
  if (i >= 0) {
    const base = p.slice(0, i + 1); // keep trailing slash
    return base || '/';
  }
  return p.endsWith('/') ? p : p + '/';
}
 
async function login() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  const base = getBase();
  try {
    const r = await fetch(`${base}api/config?token=${encodeURIComponent(t)}`, {
      headers: { Authorization: 'Bearer ' + t }
    });
    if (!r.ok) {
      document.getElementById('auth-error').textContent = 'Token 错误或反向代理未透传 Authorization';
      return;
    }
    TOKEN = t;
    localStorage.setItem('sub_token', t);
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    config = await r.json();
    applyConfig();
    await loadNodes();
    renderLinks();
  } catch (e) {
    document.getElementById('auth-error').textContent = '网络错误：' + (e && e.message ? e.message : '请稍后再试');
  }
}


window.addEventListener('load', async () => {
  // 优先从 URL ?token= 读取，其次从 localStorage
  const urlToken = new URLSearchParams(window.location.search).get('token');
  const saved = urlToken || localStorage.getItem('sub_token');
  if (saved) {
    document.getElementById('token-input').value = saved;
    await login();
  }
  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
  // 如果在子路径 /sub-hub/admin 打开，自动纠正链接展示
  renderLinks();
});

async function api(method, path, body) {
  const base = getBase();
  const opts = {
    method,
    headers: { Authorization: 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  // Add ?token= to URL for reverse proxy compatibility, while also sending Authorization header
  const url = path.startsWith('http') ? path : `${base}${path.replace(/^\//,'')}`;
  const sep = url.includes('?') ? '&' : '?';
  const finalUrl = `${url}${sep}token=${encodeURIComponent(TOKEN)}`;
  const r = await fetch(finalUrl, opts);
  if (!r.ok) {
    const e = await r.json().catch(() => ({ error: r.statusText }));
    throw new Error(e.error || r.statusText);
  }
  return r.json();
}
 
async function loadNodes() {
  nodes = await api('GET', '/api/nodes');
  renderNodes();
  updateStats();
}


function updateStats() {
  const enabled = nodes.filter(n => n.enabled).length;
  document.getElementById('stat-total').textContent    = nodes.length;
  document.getElementById('stat-enabled').textContent  = enabled;
  document.getElementById('stat-disabled').textContent = nodes.length - enabled;
}

function renderNodes() {
  const tbody = document.getElementById('nodes-tbody');
  const empty = document.getElementById('nodes-empty');
  if (!nodes.le
