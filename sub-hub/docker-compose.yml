services:
  sub-server:
    build:
      context: .
      args:
        SUBCONVERTER_VERSION: "0.9.0"   # pin the subconverter release
    image: sub-server:latest
    container_name: sub-server
    restart: unless-stopped

    ports:
      # External → internal subscription port.
      # subconverter (25500) is intentionally NOT listed here.
      - "${PORT:-8787}:8787"

    environment:
      # ── Required ──────────────────────────────────────────────────────────
      # Authentication token for the subscription URL.
      # Change this before deploying!
      TOKEN: "${TOKEN:-change-me-please}"

      # ── Optional ──────────────────────────────────────────────────────────
      # Display name embedded in the Content-Disposition header.
      SUB_NAME: "${SUB_NAME:-My Subscription}"

      # Path inside the container where nodes.txt lives.
      # Override only if you change the volume mount below.
      NODES_FILE: "/data/nodes.txt"

      # Alternatively, pass nodes inline (newline-separated proxy URIs).
      # If NODES is set, NODES_FILE is ignored.
      # NODES: |
      #   vless://uuid@host:443?type=ws&security=tls#Node-1
      #   trojan://password@host:443?type=tcp&security=tls#Node-2

    volumes:
      # Persist your nodes.txt and any custom rule files here.
      - ./data:/data

    # Keep subconverter logs quieter; change to "info" for troubleshooting.
    # (subconverter reads log_level from pref.ini, not env – this is for Docker)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
