services:
  warp-socks5:
    # build:
      # context: .
      # dockerfile: Dockerfile
    image: warp-socks5:latest
    container_name: warp-socks5
    restart: unless-stopped

    ports:
      - "127.0.0.1:1080:1080"   # 仅本机访问（推荐）
      # - "0.0.0.0:1080:1080"  # 局域网访问，取消注释

    environment:
      # ┌─────────────────────────────────────────────────────────┐
      # │  SOCKS5 代理                                            │
      # └─────────────────────────────────────────────────────────┘
      - SOCKS5_PORT=1080
      - SOCKS5_USER=            # 留空 = 无需认证
      - SOCKS5_PASS=

      # ┌─────────────────────────────────────────────────────────┐
      # │  WARP 账户类型（三选一）                                │
      # │  free  → 免费账户，无限流量（默认）                     │
      # │  plus  → WARP+ 付费，有 key 直接用，留空自动从公共池取  │
      # │  teams → Zero Trust，有 token 直接用，留空自动从公共池取│
      # └─────────────────────────────────────────────────────────┘
      - WARP_ACCOUNT_TYPE=free

      # WARP+ 许可证密钥（type=plus 时生效）
      # 格式：xxxxxxxx-xxxxxxxx-xxxxxxxx（手机 WARP App → 账户 → 密钥）
      # 留空：尝试自动获取公共池密钥（不稳定，建议填自己的）
      - WARP_LICENSE_KEY=

      # Zero Trust Token（type=teams 时生效）
      # 获取地址：在 Zero Trust 控制台创建，或通过公共池
      # 留空：尝试自动获取公共 Token
      - WARP_TEAMS_TOKEN=

      # ┌─────────────────────────────────────────────────────────┐
      # │  出口 IP 地区筛选                                       │
      # │  留空  = 不限制                                         │
      # │  单个  = "US"                                             │
      # │  多个  = "US,JP,SG,HK"（随机命中其中一个即可）              │
      # │  原理：注册新账户直到出口 IP 地区匹配，最多重试 N 次 失败则退回默认地区   │
      # └─────────────────────────────────────────────────────────┘
      - WARP_COUNTRIES=
      - WARP_COUNTRY_RETRY=5   # 地区不匹配时最大重试次数

      # ┌─────────────────────────────────────────────────────────┐
      # │  其他                                                   │
      # └─────────────────────────────────────────────────────────┘
      # ┌─────────────────────────────────────────────────────────┐
      # │  IP 栈优先级                                            │
      # │  留空 = 系统默认（Alpine 通常已是 IPv4 优先）           │
      # │  4    = 强制 IPv4 优先                                  │
      # │  6    = 强制 IPv6 优先                                  │
      # └─────────────────────────────────────────────────────────┘
      - PREFER_IP=6               # 留空=默认 | 4=IPv4优先 | 6=IPv6优先

      - WARP_DEVICE_NAME=warp-docker  # 设备名（多容器时建议各自不同）
      - FORCE_REGISTER=false          # true = 强制重注册（换 IP 用）
      - TZ=Asia/Shanghai

    # volumes:
      # - warp-data:/warp/data    # 持久化账户（重启不重注册）

    cap_add:
      - NET_ADMIN     # 必须：创建 TUN 虚拟网卡
      # - SYS_MKNOD     # 可选：宿主机无 /dev/net/tun 时容器自动创建
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0

    healthcheck:
      test: >
        bash -c 'curl -sx "socks5h://127.0.0.1:$${SOCKS5_PORT}"
        --max-time 10 -k https://www.cloudflare.com/cdn-cgi/trace
        | grep -qE "warp=(on|plus)"'
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

volumes:
  warp-data:
    driver: local
