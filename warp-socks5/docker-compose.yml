services:
  warp-socks5:
    build:
      context: .
      dockerfile: Dockerfile
    image: warp-socks5:latest
    container_name: warp-socks5
    restart: unless-stopped

    # ── 端口映射 ────────────────────────────────────────────────
    # 仅绑定本机：127.0.0.1:1080（推荐）
    # 如需局域网访问，改为 "0.0.0.0:1080:1080"
    ports:
      - "0.0.0.0:1080:1080"

    # ── 配置参数 ────────────────────────────────────────────────
    environment:
      - SOCKS5_PORT=1080
      # SOCKS5 认证（留空 = 无需认证）
      - SOCKS5_USER=
      - SOCKS5_PASS=
      # 强制重新注册 WARP 账户（换新 IP 时用）
      - FORCE_REGISTER=false
      - TZ=Asia/Shanghai

    # ── 账户信息持久化（重启不重新注册）────────────────────────
    volumes:
      - warp-data:/warp/data

    # ── 权限说明 ────────────────────────────────────────────────
    # NET_ADMIN  : 必须，创建虚拟网卡、修改容器路由表
    # SYS_MKNOD  : 可选，宿主机无 /dev/net/tun 时由容器自动创建
    cap_add:
      - NET_ADMIN
      - SYS_MKNOD

    # devices 说明：
    #   ① 宿主机有 /dev/net/tun（KVM / 物理机，绝大多数情况）
    #      → 保留此项，直接透传给容器使用
    #   ② 宿主机无 /dev/net/tun（某些 OpenVZ / LXC）
    #      → 注释掉此项，entrypoint 会在容器内自动创建
    #      → 前提：内核支持 tun 模块，且拥有上方 SYS_MKNOD 权限
    #   ③ OpenVZ 且内核完全不支持 tun
    #      → 只能去服务商控制面板开启 TUN/TAP，无法绕过
    devices:
      - /dev/net/tun:/dev/net/tun

    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0

    # ── 健康检查（通过 SOCKS5 验证 WARP 流量）─────────────────
    healthcheck:
      test: >
        bash -c 'curl -sx "socks5h://127.0.0.1:$${SOCKS5_PORT}"
        --max-time 10 -k
        https://www.cloudflare.com/cdn-cgi/trace
        | grep -qE "warp=(on|plus)"'
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 90s

volumes:
  warp-data:
    driver: local
